apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: syk-inn-api
  namespace: tsm
  labels:
    team: tsm
spec:
  gcp:
    sqlInstances:
      - type: POSTGRES_17
        name: syk-inn-api-instance
        cascadingDelete: false
        databases:
          - name: syk-inn-api
            envVarPrefix: DB
        diskAutoresize: true
        highAvailability: true
        diskType: SSD
        insights:
          enabled: true
        tier: db-custom-1-3840
        flags:
          - name: cloudsql.enable_pgaudit
            value: "true"
          - name: pgaudit.log
            value: "write,ddl,role"
          - name: pgaudit.log_parameter
            value: "on"
          - name: cloudsql.logical_decoding
            value: "on"
  kafka:
    pool: nav-prod

  port: 8080
  replicas:
    min: 2
    max: 5
    scalingStrategy:
      cpu:
        thresholdPercentage: 90
      kafka:
        consumerGroup: syk-inn-api-consumer
        threshold: 500
        topic: tsm.sykmeldinger
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 256Mi

  liveness:
    path: /internal/health/alive
  readiness:
    path: /internal/health/ready
  preStopHook:
    http:
      path: /internal/shutdown
  prometheus:
    enabled: true
    path: /internal/metrics
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java

  azure:
    application:
      enabled: true
      tenant: nav.no

  filesFrom:
    - emptyDir:
        medium: Memory
      mountPath: /app/docs

  accessPolicy:
    inbound:
      rules:
        - application: syk-inn
    outbound:
      rules:
        - application: logging
          namespace: nais-system
        - application: syfohelsenettproxy
          namespace: teamsykmelding
        - application: tsm-pdl-cache
          namespace: tsm
        - application: btsys-api
          namespace: team-rocket
  env:
    - name: SOURCE_VERSION_URL
      value: {{ sourceVersionURL }}
