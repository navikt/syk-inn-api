services:
  postgres:
    image: postgres:17-alpine
    container_name: syk-inn-api-dev-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: syk-inn-api
    ports:
      - '7969:5432'
  kafka:
    image: confluentinc/confluent-local:8.1.0
    container_name: syk-inn-api-dev-kafka
    ports:
      - "9092:9092"
