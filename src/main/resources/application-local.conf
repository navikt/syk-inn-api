ktor {
  deployment {
    port = 8080
    shutdownTimeout = 15000
  }
  application {
    modules = [no.nav.tsm.ApplicationKt.module]
  }
}

app {
  name = "local-pod"
  name = ${?POD_NAME}
  runtime = "local"
}

sykmelding {
  retention: P1D // iso standard
}

postgres {
  # Used to allow setting the DB url locally
  url = "postgresql://localhost:7969/syk-inn-api"
  url = ${?DB_URL}
  jdbc = "jdbc:"${postgres.url}
  r2dbc = {
    url = "r2dbc:"${postgres.url}
  }
  username = "user"
  username = ${?DB_USERNAME}
  password = "password"
  password = ${?DB_PASSWORD}
  schema = "new-api"
}

kafka {
  config {
    "bootstrap.servers" = "localhost:9092"
    "bootstrap.servers" = ${?BOOTSTRAP_SERVERS}
    "security.protocol" = "PLAINTEXT"
  }

  input-producer {
    delay: PT5S
    hungTimeout: PT30M
  }
  sykmelding-consumer {
    long-poll: PT10S
  }
}
