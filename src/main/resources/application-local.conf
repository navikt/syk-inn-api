ktor {
  deployment {
    port = 8080
    shutdownTimeout = 15000
  }
  application {
    modules = [no.nav.tsm.ApplicationKt.module]
  }
}

app {
  name = "local-pod"
  name = ${?POD_NAME}
  runtime = "local"
}

sykmelding {
  retention: P1D // iso standard
}

postgres {
  url = "jdbc:postgresql://localhost:7969/syk-inn-api"
  url = ${?DB_JDBC_URL}
  username = "postgres"
  username = ${?DB_USERNAME}
  password = "password"
  password = ${?DB_PASSWORD}
  schema = "new-api"
}

kafka {
  config {
    "bootstrap.servers" = "localhost:9092"
    "bootstrap.servers" = ${?BOOTSTRAP_SERVERS}
    "security.protocol" = "PLAINTEXT"
  }

  input-producer {
    delay: 5000
  }
  sykmelding-consumer {
    long-poll: 10000
  }
}
