ktor {
  deployment {
    port = 8080
    shutdownTimeout = 15000
  }
  application {
    modules = [no.nav.tsm.ApplicationKt.module]
  }
}

postgres {
  jdbc = ${DB_JDBC_URL}
  r2dbc = {
    url = "r2dbc:postgresql://"${DB_HOST}":"${DB_PORT}"/"${DB_DATABASE}"?sslRootCert="${DB_SSLROOTCERT}"&sslMode=verify-ca"
    sslCert = ${DB_SSLCERT}
    sslKeyPk8 = ${DB_SSLKEY_PK8}
  }
  username = ${DB_USERNAME}
  password = ${DB_PASSWORD}
  schema = "new-api"
}


kafka {
  config {
    "bootstrap.servers" = ${KAFKA_BROKERS}
    "security.protocol" = "SSL"
    "ssl.truststore.location" = ${KAFKA_TRUSTSTORE_PATH}
    "ssl.truststore.password" = ${KAFKA_CREDSTORE_PASSWORD}
    "ssl.truststore.type" = "jks"
    "ssl.keystore.location" = ${KAFKA_KEYSTORE_PATH}
    "ssl.keystore.password" = ${KAFKA_CREDSTORE_PASSWORD}
    "ssl.keystore.type" = "PKCS12"
  }
  sykmeldingConsumer {
    longPoll: PT10S
  }
}

auth {
  entra {
    audience = ${AZURE_APP_CLIENT_ID}
    openid {
      issuer: ${AZURE_OPENID_CONFIG_ISSUER}
      jwks: ${AZURE_OPENID_CONFIG_JWKS_URI}
    }
  }
}

app {
  name = ${NAIS_POD_NAME}
  runtime = ${NAIS_CLUSTER_NAME}
  version = ${SOURCE_VERSION_URL}

  sykmelding {
    retention: P365D
  }

  jobs {
    inputProducer {
      delay: PT10S
      hungTimeout: PT5M
    }
    juridiskProducer {
      delay: PT30S
      hungTimeout: PT60M
    }
    sykmeldingDeleter {
      interval: PT3H
    }
  }
}

external {
  texas {
    tokenEndpoint = ${NAIS_TOKEN_ENDPOINT}
  }
  tsmPdlCache = "http://tsm-pdl-cache"
  syfoHelsenettproxy = "http://syfohelsenettproxy.teamsykmelding"
  btsys = "http://btsys-api.team-rocket"
  hpr = ${EXTERNAL_HPR_URL}
}
